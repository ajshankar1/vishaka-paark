<script>
function submitForm(){
  const fn=document.getElementById('cf-fn').value.trim();
  const ph=document.getElementById('cf-ph').value.trim();
  const msg=document.getElementById('cf-msg').value.trim();
  if(!fn||!ph){alert('Please enter your name and mobile number.');return;}
  const txt=`Hi, I'm ${fn}. ${msg||'I would like to enquire about a room.'} My number is ${ph}.`;
  window.open('https://wa.me/919090927979?text='+encodeURIComponent(txt),'_blank');
}
</script>
